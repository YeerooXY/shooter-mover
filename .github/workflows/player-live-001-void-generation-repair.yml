name: PLAYER-LIVE-001 void generation repair

on:
  push:
    branches:
      - agent/player-live-001-authority

permissions:
  contents: write

jobs:
  apply-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-live-001-authority
          fetch-depth: 0

      - name: Carry void attempt generation explicitly
        run: python3 tools/player_live_001_void_generation_repair.py

      - name: Validate patch
        run: |
          git diff --check
          grep -q "AttemptGeneration" Assets/ShooterMover/ContentPackages/Environment/VoidHazards/VoidHazardModel.cs
          grep -q "request.AttemptGeneration" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1PlayerLiveAuthorityAdapterV1.cs

      - name: Remove one-shot repair machinery
        run: |
          rm tools/player_live_001_void_generation_repair.py
          rm .github/workflows/player-live-001-void-generation-repair.yml

      - name: Commit repaired branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: carry void attempt generation to player authority"
          git push origin HEAD:agent/player-live-001-authority
