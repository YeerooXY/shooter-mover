name: RUN-SESSION-001 publication repair

on:
  pull_request:
    branches:
      - agent/run-session-001-character-to-mission
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/run-session-001-character-to-mission
          fetch-depth: 0

      - name: Materialize final source tree
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import io
          import tarfile

          encoded = b''.join(
              path.read_bytes().strip()
              for path in sorted(Path('.run-session-payload').glob('part*'))
          )
          archive = base64.b64decode(encoded, validate=True)
          Path('/tmp/run-session.tar.gz').write_bytes(archive)
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as handle:
              print('\n'.join(handle.getnames()))
              handle.extractall('.', filter='data')
          PY

          test -f Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionAuthorityV1.cs
          test -f Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionPortsV1.cs
          test -f Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionSnapshotsV1.cs
          test -f Assets/ShooterMover/Tests/EditMode/RunSessions/RunSessionAuthorityV1Tests.cs

          rm -rf .run-session-payload
          rm -f .github/workflows/run-session-materialize.yml
          rm -f .run-session-repair-diagnostic.txt
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          test ! -e .run-session-payload
          test ! -e .github/workflows/run-session-materialize.yml

      - name: Commit final source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RUN-SESSION-001: materialize final source tree"
          git push origin HEAD:agent/run-session-001-character-to-mission
