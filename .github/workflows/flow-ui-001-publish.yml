name: FLOW-UI-001 publish preserved rewrite

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_SHA: f00482a2a86232275517e8b992a9f290be07a152
      BRANCH_NAME: agent/flow-ui-001-minimal-routing
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/flow-ui-001-minimal-routing
          fetch-depth: 0
          persist-credentials: true

      - name: Assemble and validate archive
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/flow-ui-001-publish.yml /tmp/flow-ui-001-publish.yml
          : > /tmp/flowfix.b64
          for id in 5016597776 5016601501 5016605963 5016614178 5016630091; do
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/comments/${id}" \
              | jq -r '.body' \
              | tail -n +2 \
              | tr -d '\r\n' >> /tmp/flowfix.b64
          done
          cat \
            .flow-ui-transfer/chunk-07a.b64 \
            .flow-ui-transfer/chunk-07b.b64 \
            .flow-ui-transfer/chunk-08a.b64 \
            .flow-ui-transfer/chunk-08b.b64 \
            .flow-ui-transfer/chunk-09.b64 >> /tmp/flowfix.b64
          test "$(wc -c < /tmp/flowfix.b64)" -eq 48352
          echo 'e7c80da125e135c3886d21e59b34036c82253501dc37c4ec5f89da585b0d5ed2  /tmp/flowfix.b64' | sha256sum -c -
          base64 --decode /tmp/flowfix.b64 > /tmp/flowfix.tar.gz
          echo '63ffbfb676990bb51de81bacbac33dc254855f6ec8ab3c163f91b9097bd56fe6  /tmp/flowfix.tar.gz' | sha256sum -c -
          gzip -t /tmp/flowfix.tar.gz

      - name: Reset and restore reviewed files
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard "${BASE_SHA}"
          tar -xzf /tmp/flowfix.tar.gz -C "${GITHUB_WORKSPACE}"
          mkdir -p .github/workflows
          cp /tmp/flow-ui-001-publish.yml .github/workflows/flow-ui-001-publish.yml
          test -f Assets/ShooterMover/UI/ProductionFlow/ProductionFlowCoordinatorV1.cs
          test ! -f Assets/ShooterMover/Runtime/Application/Flow/Hub/MinimalProductionFlowAuthorityV1.cs
          test ! -d .flow-ui-transfer

      - name: Commit replacement
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'FLOW-UI-001: replace duplicate flow with authority adapters'

      - name: Force-update PR branch
        shell: bash
        run: |
          set -euo pipefail
          git push --force-with-lease="refs/heads/${BRANCH_NAME}:${EXPECTED_HEAD_SHA}" \
            origin "HEAD:refs/heads/${BRANCH_NAME}"
