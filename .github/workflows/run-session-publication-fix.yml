name: RUN-SESSION-001 repair materialized test directives

on:
  pull_request:
    branches:
      - agent/run-session-001-character-to-mission
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/run-session-001-character-to-mission
          fetch-depth: 0

      - name: Repair exact malformed directives
        shell: bash
        run: |
          set -euo pipefail
          target=Assets/ShooterMover/Tests/EditMode/RunSessions/RunSessionAuthorityV1Tests.cs
          test -f "$target"
          test "$(grep -c '^us    ' "$target")" -eq 12
          sed -i 's/^us    /using /' "$target"
          test "$(grep -c '^using ' "$target")" -ge 12
          test "$(grep -c '^us    ' "$target" || true)" -eq 0
          rm -f .github/workflows/run-session-publication-fix.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          test ! -e .github/workflows/run-session-publication-fix.yml

      - name: Commit corrected source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RUN-SESSION-001: repair materialized test directives"
          git push origin HEAD:agent/run-session-001-character-to-mission
