name: Enemy Factory Materialize

on:
  push:
    branches:
      - agent/enemy-factory-001-placement-runtime

permissions:
  contents: write

concurrency:
  group: enemy-factory-materialize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize and verify sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Assets/ShooterMover/Runtime/EnemyRuntimeComposition
          mkdir -p Assets/ShooterMover/Tests/EditMode/Enemies

          cat .enemy-factory-payload/archive/*.b64 | base64 --decode > /tmp/enemy-factory-sources.tar.gz
          echo "b54280af981be3e0324e76a53bb3165c170556b658d828433a8eddb16d3c7fb9  /tmp/enemy-factory-sources.tar.gz" | sha256sum -c -
          tar -xzf /tmp/enemy-factory-sources.tar.gz

          echo "5bfc57d07d6f83e8dcf59e7e37e2e995e51a7bb7e88ed33fe6f57cca42b65e8b  Assets/ShooterMover/Runtime/EnemyRuntimeComposition/EnemyRuntimeCompositionContractsV1.cs" | sha256sum -c -
          echo "b3a01cab07a2e6f0ef7ffb2c31fd8f236268ee877ee6bc75318bf14412622cba  Assets/ShooterMover/Runtime/EnemyRuntimeComposition/EnemyRuntimePolicyRegistryV1.cs" | sha256sum -c -
          echo "1c1042dc6ddf763fa54b43d3538f80f61402b41bc49b30537aaaa57f2bd5aa3e  Assets/ShooterMover/Runtime/EnemyRuntimeComposition/EnemyPlacementRuntimeFactoryV1.cs" | sha256sum -c -
          echo "be5888c51599fc3678f3b87822dd6f0e491f7aba8b590700dde1542025a5f453  Assets/ShooterMover/Tests/EditMode/Enemies/EnemyPlacementRuntimeFactoryV1Tests.cs" | sha256sum -c -

          python -m json.tool Assets/ShooterMover/Runtime/EnemyRuntimeComposition/ShooterMover.EnemyRuntimeComposition.asmdef >/dev/null
          python -m json.tool Assets/ShooterMover/Tests/EditMode/ShooterMover.Tests.EditMode.asmdef >/dev/null

          rm -rf .enemy-factory-payload
          rm -f .github/workflows/enemy-factory-materialize.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ENEMY-FACTORY-001: materialize placement runtime"
          git push origin HEAD:${GITHUB_REF_NAME}
