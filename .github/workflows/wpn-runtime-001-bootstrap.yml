name: WPN-RUNTIME-001 apply

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply focused runtime change
        shell: bash
        run: |
          cat .github/wpn-runtime-bootstrap/apply.py.gz.b64.* | base64 -d | gzip -d > /tmp/apply.py
          python3 /tmp/apply.py
          rm -rf .github/wpn-runtime-bootstrap
      - name: Validate patch shape
        shell: bash
        run: |
          git diff --check
          test -f Assets/ShooterMover/Runtime/Application/Weapons/Firing/WeaponDefinitionFiringRuntime.cs
          test -f Assets/ShooterMover/Resources/WeaponCatalog/stage1_weapon_baseline_v01.json
          ! grep -q "private bool FireWeapon" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1VisibleSliceController.cs
          ! grep -q "nextBlasterShotTime" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1VisibleSliceController.cs
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "WPN-RUNTIME-001 Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "WPN-RUNTIME-001: connect JSON weapons to Stage 1 firing"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
