name: PLAYER-LIVE-001 projectile ledger repair

on:
  push:
    branches:
      - agent/player-live-001-authority

permissions:
  contents: write

jobs:
  apply-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-live-001-authority
          fetch-depth: 0

      - name: Preserve projectile emission generation
        run: python3 tools/player_live_001_projectile_ledger_repair.py

      - name: Validate patch
        run: |
          git diff --check
          grep -q "ProjectileExecutionEmission2D" Assets/ShooterMover/ContentPackages/Weapons/Shared/Runtime/ProjectileExecutionPlanAdapter.cs
          grep -q "projectileGenerations" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1PlayerLiveAuthorityAdapterV1.cs
          grep -q "ApplyRestartCommand" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1PlayerLiveAuthorityAdapterV1.cs
          if grep -q "TryResolveLifecycleGeneration(.*translation.Message.EventId" Assets/ShooterMover/TestSupport/VisibleSlice/Stage1PlayerLiveAuthorityAdapterV1.cs; then
            echo "Projectile generation is still parsed from the hit event" >&2
            exit 1
          fi

      - name: Remove one-shot repair machinery
        run: |
          rm tools/player_live_001_projectile_ledger_repair.py
          rm .github/workflows/player-live-001-projectile-ledger-repair.yml

      - name: Commit repaired branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve projectile emission generation"
          git push origin HEAD:agent/player-live-001-authority
