name: ARCH-CLEAN commit Blaster Turret definition

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/arch-clean-001-remove-legacy-vertical-slice'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish one clean commit
        shell: bash
        run: |
          set -euo pipefail
          BRANCH=agent/arch-clean-001-remove-legacy-vertical-slice
          REMOTE_HEAD=$(git ls-remote origin "refs/heads/$BRANCH" | cut -f1)
          git reset --hard c3626a2fda2930fe8c8ee47960c9dbbcf9c079e0
          echo '' | base64 -d > /tmp/change.patch
          git apply --check /tmp/change.patch
          git apply /tmp/change.patch
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add Assets/ShooterMover/ContentPackages/Enemies/BlasterTurret/BlasterTurretDefinition.cs
          git commit -m "Detach Blaster Turret from Stage1 registry"
          git push --force-with-lease="refs/heads/$BRANCH:$REMOTE_HEAD" origin HEAD:"refs/heads/$BRANCH"
