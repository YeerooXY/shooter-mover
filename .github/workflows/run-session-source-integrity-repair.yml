name: RUN-SESSION-001 source integrity repair

on:
  pull_request:
    branches:
      - agent/run-session-001-character-to-mission
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/run-session-001-character-to-mission
          fetch-depth: 0

      - name: Restore preserved authored sources
        shell: bash
        run: |
          set -euo pipefail
          cat .run-session-repair/part* | base64 --decode > /tmp/run-session-repair.tar.gz
          tar -tzf /tmp/run-session-repair.tar.gz
          tar -xzf /tmp/run-session-repair.tar.gz

      - name: Verify complete C# source integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          expected = {
              "Assets/ShooterMover/Runtime/Application/Runs/Session/ExistingRunAuthorityPortsV1.cs": "4eb7c0f158b16bab268d3d65f788d810c38586f7",
              "Assets/ShooterMover/Runtime/Application/Runs/Session/ProductionRunSessionCompositionV1.cs": "56fa9db744f0bcb57b8388fd8f97d688bb9a3785",
              "Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionAuthorityV1.cs": "54125709e498d89000df6ffa9054680b77420d13",
              "Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionCommandsV1.cs": "e70507d9cdd4236c7108ce184204ffef1ba04a42",
              "Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionPortsV1.cs": "c399f6bd8aecb88d60bd368b43a57380cbec41a4",
              "Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionSnapshotsV1.cs": "e9700f2279504120526103e9f2c575e7f8dea34d",
              "Assets/ShooterMover/Runtime/UnityAdapters/Players/RunSessions/ExistingPlayerAndWeaponRunPortsV1.cs": "a3146558b57b5ab40a72317e8dd54120f5ad9001",
              "Assets/ShooterMover/Tests/EditMode/RunSessions/ProductionRunSessionCompositionV1Tests.cs": "e8e3e1c0450deaf0ed2edbc281c9cc8fc4f7d340",
              "Assets/ShooterMover/Tests/EditMode/RunSessions/RunSessionAuthorityV1Tests.cs": "135bd1a30b710d38ba54a538eef8d9a871aeb69e",
          }

          for path, wanted in expected.items():
              if not Path(path).is_file():
                  raise SystemExit(f"missing expected source: {path}")
              actual = subprocess.check_output(
                  ["git", "hash-object", path], text=True).strip()
              if actual != wanted:
                  raise SystemExit(
                      f"source integrity mismatch: {path}: {actual} != {wanted}")

          authority = Path(
              "Assets/ShooterMover/Runtime/Application/Runs/Session/RunSessionAuthorityV1.cs"
          ).read_text(encoding="utf-8")
          required = [
              "RestartRunSessionCommandV1 command,\n            string rejectionCode)",
              "RunLocalStateSnapshotV1 state,\n            string rejectionCode)",
              "IDictionary<string, long> target,\n            string key,\n            long amount)",
          ]
          for fragment in required:
              if fragment not in authority:
                  raise SystemExit(f"required repaired declaration missing: {fragment!r}")

          forbidden = ["string rCode", "us    System", "      }\n\n            string"]
          for token in forbidden:
              for path in expected:
                  if token in Path(path).read_text(encoding="utf-8"):
                      raise SystemExit(f"materialization damage token {token!r} in {path}")
          PY

      - name: Remove repair staging and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .run-session-repair
          rm -f .github/workflows/run-session-source-integrity-repair.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          test ! -e .run-session-repair
          test ! -e .github/workflows/run-session-source-integrity-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RUN-SESSION-001: restore exact authored C# sources"
          git push origin HEAD:agent/run-session-001-character-to-mission
